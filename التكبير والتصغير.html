<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التكبير والتصغير</title>
  <style>
    #text {
      font-size: 16px;
      text-align: center;
      margin: 20px;
    }
    button {
      margin: 5px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div id="text">هذا النص يمكنك تكبيره أو تصغيره!</div>
  <button onclick="zoomIn()">تكبير</button>
  <button onclick="zoomOut()">تصغير</button>

  <script>
    function zoomIn() {
      const text = document.getElementById('text');
      let style = window.getComputedStyle(text, null).getPropertyValue('font-size');
      let currentSize = parseFloat(style);
      text.style.fontSize = (currentSize + 2) + 'px';
    }

    function zoomOut() {
      const text = document.getElementById('text');
      let style = window.getComputedStyle(text, null).getPropertyValue('font-size');
      let currentSize = parseFloat(style);
      text.style.fontSize = (currentSize - 2) + 'px';
    }
  </script>
</body>
</html>
